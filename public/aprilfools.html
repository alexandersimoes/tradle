<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width,initial-scale=1,maximum-scale=1"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600&family=Source+Sans+Pro:wght@400;600&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.jsdelivr.net/npm/d3plus@2"></script>
    <title>April Fools</title>
    <style>
      :root {
        --sand: #f4d8a6;
        --dune: #e88a3d;
        --deep-dune: #b65326;
        --shadow: #2c2723;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background: radial-gradient(
            circle at top,
            rgba(255, 241, 207, 0.95),
            transparent 40%
          ),
          linear-gradient(180deg, #f6e1bc 0%, #f3c57c 45%, #d98538 100%);
        font-family: "Source Sans Pro", sans-serif;
      }

      #viz {
        height: 100vh;
        width: 100vw;
      }

      .d3plus-tooltip {
        border: 1px solid #4a3421 !important;
        min-width: 260px;
        z-index: 101 !important;
      }

      .d3plus-tooltip table {
        min-width: 95% !important;
        width: 95% !important;
        margin: 10px auto !important;
      }

      .d3plus-tooltip tbody tr {
        border-top: 1px solid rgba(255, 255, 255, 0.15) !important;
      }

      .d3plus-tooltip tbody tr:first-child,
      .d3plus-tooltip thead tr {
        border-top: 0 !important;
      }

      .d3plus-tooltip td,
      .d3plus-tooltip th {
        text-align: right;
        padding: 5px;
      }

      .d3plus-tooltip td:first-child,
      .d3plus-tooltip th:first-child {
        text-align: left;
        font-weight: 600;
      }

      .d3plus-tooltip-title-wrapper {
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .d3plus-tooltip-title-wrapper .swatch {
        width: 16px;
        height: 40px;
        border-radius: 999px;
        flex-shrink: 0;
      }

      .d3plus-tooltip-title-wrapper .title {
        display: flex;
        align-items: center;
        min-height: 40px;
      }

      .d3plus-tooltip-title-wrapper .title span {
        display: -webkit-box;
        overflow: hidden;
        text-overflow: ellipsis;
        -webkit-line-clamp: 4;
        -webkit-box-orient: vertical;
      }
    </style>
  </head>
  <body>
    <div id="viz"></div>
    <script>
      var colors = {
        "Spice Economy": "#d45b2f",
        "Sandworm Industry": "#b39162",
        "Survival Gear": "#2f3237",
        "Holy War Logistics": "#7b1e16",
        "Water Infrastructure": "#6b8f3d",
        "Messianic Branding": "#8a4f20",
      };

      var labelColors = {
        "Spice Economy": "#1c1108",
        "Sandworm Industry": "#1c1108",
        "Survival Gear": "#f8f1e2",
        "Holy War Logistics": "#f8f1e2",
        "Water Infrastructure": "#10200a",
        "Messianic Branding": "#f8f1e2",
      };

      var data = [
        {
          category: "Spice Economy",
          product: "Spice Melange",
          percent: 22,
          value: 22,
        },
        {
          category: "Sandworm Industry",
          product: "Shai-Hulud Sandworm Meat & Byproducts",
          percent: 12,
          value: 12,
        },
        {
          category: "Survival Gear",
          product: "Water Recycling Stillsuits",
          percent: 15,
          value: 15,
        },
        {
          category: "Holy War Logistics",
          product: "Other Holy War Exports",
          percent: 12,
          value: 12,
        },
        {
          category: "Spice Economy",
          product: "Blue-in-the-Eyes Spice Glow",
          percent: 8,
          value: 8,
        },
        {
          category: "Water Infrastructure",
          product: "Dew Collectors & Wind Traps",
          percent: 7,
          value: 7,
        },
        {
          category: "Messianic Branding",
          product: "Lisan al-Gaib Prophecy Merch",
          percent: 6,
          value: 6,
        },
        {
          category: "Survival Gear",
          product: "Crysknife Handcrafted Blades (Worm-Tooth Edged)",
          percent: 4,
          value: 4,
        },
        {
          category: "Sandworm Industry",
          product: "Thumper & Maker Hooks (Worm Riding Gear)",
          percent: 2,
          value: 2,
        },
      ];

      function tooltipTitle(d) {
        var tooltip = "<div class='d3plus-tooltip-title-wrapper'>";
        tooltip +=
          "<div class='swatch' style='background-color: " +
          colors[d.category] +
          ";'></div>";
        tooltip += "<div class='title'><span>" + d.product + "</span></div>";
        tooltip += "</div>";
        return tooltip;
      }

      function getCategoryKey(d) {
        return d && typeof d.id === "string" ? d.id : d.category;
      }

      new d3plus.Treemap()
        .select("#viz")
        .config({
          data: data,
          groupBy: ["category", "product"],
          legendPosition: "bottom",
          legendConfig: {
            shapeConfig: {
              fill: function (d) {
                return colors[getCategoryKey(d)] || "#2c2723";
              },
              labelConfig: {
                fontColor: "#24170d",
                fontFamily: function () {
                  return "'Source Sans Pro', sans-serif";
                },
                fontSize: 14,
              },
              strokeWidth: 0,
            },
            tooltipConfig: {
              title: function (d) {
                var category = getCategoryKey(d);
                return (
                  "<div class='d3plus-tooltip-title-wrapper'>" +
                  "<div class='swatch' style='background-color: " +
                  (colors[category] || "#2c2723") +
                  ";'></div>" +
                  "<div class='title'><span>" +
                  category +
                  "</span></div>" +
                  "</div>"
                );
              },
            },
          },
          shapeConfig: {
            fill: function (d) {
              return colors[d.category];
            },
            stroke: "#f6e8ce",
            strokeWidth: 2,
            labelConfig: {
              fontColor: function (d) {
                return labelColors[d.category];
              },
              fontFamily: function () {
                return "'Source Sans Pro', sans-serif";
              },
              fontResize: true,
              padding: 8,
            },
            Rect: {
              labelConfig: {
                fontMax: 22,
                fontMin: 8,
                padding: 6,
              },
            },
          },
          tooltipConfig: {
            background: "#2a1d13",
            title: tooltipTitle,
            tbody: function (d) {
              return [
                ["Category", d.category],
                ["Export Share", d.percent + "%"],
                ["Market", "Imperium, 10191 AG"],
              ];
            },
            footerStyle: {
              fontFamily: function () {
                return "'Source Sans Pro', sans-serif";
              },
              "font-size": "12px",
              "font-weight": "600",
              "padding-bottom": "6px",
              "padding-top": "0",
              "text-align": "center",
            },
            padding: "0px",
            tbodyStyle: {
              color: "#f5eada",
            },
            titleStyle: {
              color: "#fff4e2",
              padding: "8px",
              fontFamily: function () {
                return "'Cinzel', serif";
              },
              "font-size": "16px",
              "font-weight": "600",
              "max-height": "100px",
              overflow: "hidden",
              "text-overflow": "ellipsis",
              display: "-webkit-box",
              "-webkit-box-orient": "vertical",
              "-webkit-line-clamp": "4",
            },
          },
          total: "value",
          totalConfig: {
            fontColor: "#2b190d",
            fontSize: function () {
              return 18;
            },
            "text-transform": "uppercase",
          },
          totalFormat: function () {
            return "620,000 solari";
          },
        })
        .render();
    </script>
  </body>
</html>
